name: CI

on:
  workflow_dispatch:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: Rococo CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Selenoid Chrome image
        id: cache-chrome
        uses: actions/cache@v4
        with:
          path: /tmp/selenoid-chrome.tar
          key: docker-twilio-selenoid-chrome-stable-147

      - name: Pull Selenoid Chrome image (background)
        run: |
          (
            if [ "${{ steps.cache-chrome.outputs.cache-hit }}" = "true" ]; then
              docker load -i /tmp/selenoid-chrome.tar
            else
              docker pull twilio/selenoid:chrome_stable_147
              docker save twilio/selenoid:chrome_stable_147 -o /tmp/selenoid-chrome.tar
            fi
            touch /tmp/chrome-ready
          ) &

      # Step 1: Build all modules + unit tests
      - name: Build & run unit tests
        run: ./gradlew build -x :rococo-tests:compileTestJava -x :rococo-tests:testClasses

      # Step 2: Build Docker images
      - name: Build service Docker images
        run: ./gradlew dockerBuildAll

      - name: Build client Docker image
        run: docker build -f rococo-client/Dockerfile -t rococo-client:latest rococo-client

      - name: Build tests Docker image
        run: |
          ./gradlew :rococo-tests:build -x test
          docker build -f rococo-tests/Dockerfile -t rococo-tests:latest .

      # Step 3: Start infra + services and run tests
      - name: Wait for Selenoid Chrome image
        run: while [ ! -f /tmp/chrome-ready ]; do sleep 1; done

      - name: Run tests
        run: COMPOSE_PROFILES=env,modules,tests docker compose up --exit-code-from rococo-tests
        continue-on-error: true

      - name: Stop all containers
        if: always()
        run: COMPOSE_PROFILES=env,modules,tests docker compose down

      # Step 4: Generate Allure report
      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate --single-file allure-results -o allure-report --clean

      # Step 5: Upload report artifact
      - name: Upload Allure report
        if: always()
        id: upload-report
        uses: actions/upload-artifact@v7
        with:
          name: report
          path: allure-report/
          retention-days: 14

      # Step 6: Publish test results
      - name: Publish test results
        if: always()
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
        with:
          script: |
            const script = require('./.github/scripts/publish-test-results.js');
            await script({ github, context, core, glob });
