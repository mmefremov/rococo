<!DOCTYPE HTML>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
  <title>Регистрация в Rococo</title>
  <link rel="icon" th:href="@{/images/favicon.ico}"/>
  <link rel="stylesheet" th:href="@{/styles/styles.css}" type="text/css"/>
</head>
<body>
<main>
  <div class="wrapper">
    <section class="content">
      <form action="/register" class="form" id="register-form" method="post"
            th:action="@{/register}" th:if="${username == null}"
            th:object="${registrationForm}">
        <h1 class="form__header">Ro<span class="form__text_gold">coco</span></h1>
        <label class="form__element">
          <span class="form__label">Имя пользователя</span>
          <span class="error__indicator error__username" th:if="${#fields.hasErrors('username')}"></span>
          <input class="form__input" id="username" name="username" placeholder="Введите имя пользователя..." required
                 th:field="*{username}" type="text"/>
          <span class="form__error error__username" th:errors="*{username}" th:if="${#fields.hasErrors('username')}"></span>
        </label>
        <label class="form__element">
          <span class="form__label">Пароль</span>
          <span class="error__indicator error__password" th:if="${#fields.hasErrors('password')}"></span>
          <input class="form__input" id="password" name="password" placeholder="Введите пароль..." required
                 th:field="*{password}" type="password"/>
          <span class="form__error error__password" th:errors="*{password}" th:if="${#fields.hasErrors('password')}"></span>
        </label>
        <label class="form__element">
          <span class="form__label">Повторите пароль</span>
          <span class="error__indicator error__passwordSubmit" th:if="${#fields.hasErrors('passwordSubmit')}"></span>
          <input class="form__input" id="passwordSubmit" name="passwordSubmit" placeholder="Повторите пароль..."
                 required th:field="*{passwordSubmit}" type="password"/>
          <span class="form__error error__passwordSubmit" th:errors="*{passwordSubmit}"
                th:if="${#fields.hasErrors('passwordSubmit')}"></span>
        </label>
        <button class="form__submit" type="submit">
          Зарегистрироваться
        </button>
        <p class="form__paragraph">Уже есть аккаунт? <a class="form__link" th:href="@{|${frontUri}|}">Войти</a></p>
      </form>
      <div class="form" th:unless="${username == null}">
        <p class="form__subheader">Добро пожаловать в Ro<span class="form__text_gold">coco</span></p>
        <p class="form__paragraph"><a class="form__submit" th:href="@{|${frontUri}|}">Войти в систему</a></p>
      </div>
      <img alt="Ренуар" class="content__image" src="../static/images/renuar.jpeg" th:src="@{/images/renuar.jpeg}" width="90"/>
    </section>
  </div>
</main>
<script>
  const usernameInput = document.querySelector("#username");
  const passwordInput = document.querySelector("#password");
  const passwordSubmitInput = document.querySelector("#passwordSubmit");

  usernameInput.addEventListener("input", () => {
    const error = document.querySelectorAll(".error__username");
    error.forEach(err => err.remove());
  });

  passwordInput.addEventListener("input", () => {
    const error = document.querySelectorAll(".error__password");
    error.forEach(err => err.remove());
  });

  passwordSubmitInput.addEventListener("input", () => {
    const error = document.querySelectorAll(".error__passwordSubmit");
    error.forEach(err => err.remove());
  });
</script>
</body>
</html>
