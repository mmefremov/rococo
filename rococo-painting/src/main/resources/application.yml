server:
  port: 8099

grpc:
  server:
    port: 8100
  client:
    artist:
      address: 'static://localhost:8096'
      negotiation-type: PLAINTEXT
    museum:
      address: 'static://localhost:8098'
      negotiation-type: PLAINTEXT

spring:
  application:
    name: rococo-painting
  datasource:
    url: 'jdbc:postgresql://localhost:6432/rococo_painting'
    username: postgres
    password: secret
    hikari:
      connection-timeout: 20000
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 10000
      max-lifetime: 1800000
      auto-commit: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration/rococo-painting
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false
    open-in-view: false

logging:
  level:
    root: INFO
    io.efremov.rococo: DEBUG
---
spring:
  config:
    activate:
      on-profile: 'docker'
  datasource:
    url: 'jdbc:postgresql://rococo-postgres:5432/rococo_painting'

grpc:
  client:
    artist:
      address: 'static://rococo-artist:8096'
      negotiation-type: PLAINTEXT
    museum:
      address: 'static://rococo-museum:8098'
      negotiation-type: PLAINTEXT
