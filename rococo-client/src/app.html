<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <link href="%sveltekit.assets%/favicon.ico" rel="icon"/>
  <title>Rococo</title>
  <meta content="width=device-width" name="viewport"/>
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('rococo-theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
      }
    })();
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover" data-theme="gold-nouveau">
<div class="h-full overflow-hidden" style="display: contents">%sveltekit.body%</div>
</body>
</html>
